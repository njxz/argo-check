apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  labels:
    app.kubernetes.io/name: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlantis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlantis
    spec:
      serviceAccountName: atlantis
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.29.0
          args:
            - server
            - --repo-allowlist=github.com/njxz/argo-check
            - --gh-user=atlantis
            - --gh-token=$(ATLANTIS_GH_TOKEN)
            - --gh-webhook-secret=$(ATLANTIS_WEBHOOK_SECRET)
            - --repo-config=/etc/atlantis/repos.yaml
          envFrom:
            - secretRef:
                name: atlantis-secrets
          ports:
            - name: http
              containerPort: 4141
          volumeMounts:
            - name: repo-config
              mountPath: /etc/atlantis
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4141
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: repo-config
          configMap:
            name: atlantis-repo-config
