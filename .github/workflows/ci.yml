name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init and validate
        run: |
          for dir in infra/terraform/envs/*; do
            [ -d "$dir" ] || continue
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  kubernetes:
    name: Kubernetes validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate Kubernetes manifests
        run: |
          find k8s atlantis argo -name '*.yaml' -print0 | xargs -0 kubeconform \
            -summary \
            -ignore-missing-schemas \
            -schema-location default
