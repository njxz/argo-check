name: Argo Deploy Comment

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      workflow:
        description: Argo workflow name under argo/, without .yaml
        required: true
        default: file-check-pipeline
      repo:
        description: Repository clone URL passed to the Argo workflow
        required: false
        default: https://github.com/njxz/argo-check.git
      revision:
        description: Git revision passed to the Argo workflow
        required: false
        default: main

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  deploy:
    name: Submit Argo workflow
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request &&
        (
          startsWith(github.event.comment.body, 'argo deploy ') ||
          startsWith(github.event.comment.body, '/argo deploy ')
        )
      )
    runs-on: ${{ vars.ARGO_RUNNER || 'self-hosted' }}
    timeout-minutes: 20

    env:
      ARGO_NAMESPACE: argo
      ARGO_KUBECONFIG_B64: ${{ secrets.ARGO_KUBECONFIG_B64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy request
        id: request
        uses: actions/github-script@v7
        with:
          script: |
            let workflow;
            let repo;
            let revision;

            if (context.eventName === "workflow_dispatch") {
              workflow = context.payload.inputs.workflow;
              repo = context.payload.inputs.repo || "https://github.com/njxz/argo-check.git";
              revision = context.payload.inputs.revision || "main";
            } else {
              const body = context.payload.comment.body.trim();
              const match = body.match(/^\/?argo\s+deploy\s+([A-Za-z0-9_.-]+)\s*$/);
              if (!match) {
                core.setFailed("Usage: argo deploy <workflow-name>");
                return;
              }

              workflow = match[1].endsWith(".yaml") ? match[1].slice(0, -5) : match[1];

              const { owner, repo: repoName } = context.repo;
              const pull_number = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({ owner, repo: repoName, pull_number });

              repo = pr.head.repo.clone_url;
              revision = pr.head.sha;
            }

            const allowedWorkflows = new Set(["file-check-pipeline"]);
            if (!allowedWorkflows.has(workflow)) {
              core.setFailed(`Unsupported workflow: ${workflow}`);
              return;
            }

            core.setOutput("workflow", workflow);
            core.setOutput("workflow_file", `argo/${workflow}.yaml`);
            core.setOutput("repo", repo);
            core.setOutput("revision", revision);

      - name: Validate workflow file exists
        run: test -f "${{ steps.request.outputs.workflow_file }}"

      - name: Load kubeconfig from secret
        if: ${{ env.ARGO_KUBECONFIG_B64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if ! printf '%s' "$ARGO_KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            printf '%s' "$ARGO_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config" 2>/dev/null || \
              printf '%s' "$ARGO_KUBECONFIG_B64" | base64 -D > "$HOME/.kube/config"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Install Argo CLI
        run: |
          set -euo pipefail
          if command -v argo >/dev/null 2>&1; then
            argo version --client
            exit 0
          fi

          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *) echo "Unsupported architecture: $arch"; exit 1 ;;
          esac

          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSL -o "$RUNNER_TEMP/argo.gz" "https://github.com/argoproj/argo-workflows/releases/latest/download/argo-${os}-${arch}.gz"
          gunzip "$RUNNER_TEMP/argo.gz"
          chmod +x "$RUNNER_TEMP/argo"
          mv "$RUNNER_TEMP/argo" "$RUNNER_TEMP/bin/argo"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/argo" version --client

      - name: Submit workflow
        id: submit
        shell: bash
        run: |
          set -euo pipefail
          output="$(
            argo submit "${{ steps.request.outputs.workflow_file }}" \
              -n "$ARGO_NAMESPACE" \
              -p repo="${{ steps.request.outputs.repo }}" \
              -p revision="${{ steps.request.outputs.revision }}" \
              --watch
          )"
          printf '%s\n' "$output"
          workflow_name="$(printf '%s\n' "$output" | awk '/Name:/ {print $2; exit}')"
          echo "workflow_name=${workflow_name:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Comment result on PR
        if: ${{ github.event_name == 'issue_comment' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = "${{ steps.request.outputs.workflow || 'unknown' }}";
            const revision = "${{ steps.request.outputs.revision || 'unknown' }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = "${{ job.status }}" === "success"
              ? `Argo workflow \`${workflow}\` finished successfully on \`${revision}\`.`
              : `Argo workflow \`${workflow}\` failed. Check this Actions run: ${runUrl}`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body,
            });
